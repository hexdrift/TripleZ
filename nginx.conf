server {
    listen 80;
    root /usr/share/nginx/html;

    # Proxy API and SSE to the backend service.
    # In two-pod mode, "backend" is the docker-compose service name.
    # Override by setting BACKEND_HOST env var.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # Serve static frontend, fallback to index.html for client routing
    location / {
        try_files $uri $uri/index.html $uri/ /index.html;
    }
}
